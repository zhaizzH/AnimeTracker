# ===================================================================
# AnimeTracker API — 测试环境配置
# ===================================================================
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1

  data:
    redis:
      host: localhost
      port: 6379
      database: 1

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# Jackson 配置
jackson:
  default-property-inclusion: non_null

# JWT 配置
jwt:
  secret: dev-secret-key-not-for-production-use-change-it
  expiration: 86400000

# 日志
logging:
  level:
    top.zhaizz.animetracker: DEBUG
