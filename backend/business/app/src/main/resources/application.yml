# ===================================================================
# AnimeTracker API — 生产环境配置
# ===================================================================
server:
  port: 8080

spring:
  application:
    name: animetracker-api

  profiles:
    active: local

  datasource:
    driver-class-name: ${zzz.datasource.driver-class-name}
    url: jdbc:mysql://${zzz.datasource.host}:${zzz.datasource.port}/${zzz.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${zzz.datasource.username}
    password: ${zzz.datasource.password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: ${zzz.data.redis.host:localhost}
      port: ${zzz.data.redis.port:6379}
      database: ${zzz.data.redis.database:1}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: ${zzz.jackson.default-property-inclusion:non_null}

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: top.zhaizz.animetracker.**.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${mybatis-plus.configuration.log-impl:org.apache.ibatis.logging.stdout.StdOutImpl}

# Knife4j API文档配置
knife4j:
  enable: true # 是否启用Knife4j（必填，默认false）
  setting:
    language: zh-CN # 界面语言（中文）
    swagger-model-name: 实体列表
  production: false # 是否为生产环境（生产环境建议设为true，关闭文档访问）
  basic:
    enable: false # 是否开启基础认证（如需权限控制可设为true）
    username: admin # 认证用户名
    password: 123456 # 认证密码

springdoc:
  api-docs:
    path: /v3/api-docs

# JWT 配置
jwt:
  secret: ${jwt.secret:your-256-bit-secret-for-animetracker-jwt-token-signing}
  expiration: ${jwt.expiration:86400000}  # 24 小时（毫秒）

# 日志
logging:
  level:
    top.zhaizz.animetracker: INFO
    com.baomidou.mybatisplus: INFO
