# ===================================================================
# AnimeTracker API — 生产环境配置
# ===================================================================
server:
  port: 8080

spring:
  application:
    name: animetracker-business

  profiles:
    active: local

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    driver-class-name: ${zzz.datasource.driver-class-name:com.mysql.cj.jdbc.Driver}
    url: jdbc:mysql://${zzz.datasource.host}:${zzz.datasource.port}/${zzz.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${zzz.datasource.username:root}
    password: ${zzz.datasource.password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:
      host: ${zzz.data.redis.host:localhost}
      port: ${zzz.data.redis.port:6379}
      database: ${zzz.data.redis.database:1}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: ${zzz.jackson.default-property-inclusion:non_null}

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: top.zhaizz.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: ${mybatis-plus.configuration.log-impl:org.apache.ibatis.logging.stdout.StdOutImpl}


# JWT 配置
jwt:
  secret: ${jwt.secret}
  expiration: ${jwt.expiration}

# 日志
logging:
  level:
    top.zhaizz: warn
    com.baomidou.mybatisplus: warn
