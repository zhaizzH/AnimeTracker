# ===================================================================
# AnimeTracker API — 生产环境配置
# ===================================================================
server:
  port: 8080

spring:
  application:
    name: animetracker-business # 应用名称

  profiles:
    active: local # 激活的配置文件

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    driver-class-name: ${at.datasource.driver-class-name} # 数据库驱动类名
    url: jdbc:mysql://${at.datasource.host}:${at.datasource.port}/${at.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${at.datasource.username}
    password: ${at.datasource.password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000

  data:
    redis:  # redis 配置
      host: ${at.data.redis.host}
      port: ${at.data.redis.port}
      password: ${at.data.redis.password}
      database: ${at.data.redis.database:1}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: ${at.jackson.default-property-inclusion}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: top.zhaizz.pojo.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl


# JWT 配置
jwt:
  secret: ${jwt.secret}
  expiration: ${jwt.expiration}
  refresh-expiration: ${jwt.refresh-expiration}

# MinIO 对象存储
minio:
  endpoint: http://${minio.endpoint}:${minio.port}
  access-key: ${minio.access-key}
  secret-key: ${minio.secret-key}
  bucket: ${minio.bucket}

# Resend 邮件服务
resend:
  api-key: ${resend.api-key}

# 日志
logging:
  level:
    top.zhaizz: warn
    com.baomidou.mybatisplus: warn
